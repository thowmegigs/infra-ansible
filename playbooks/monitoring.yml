---
# Monitoring: host + service exporters → Prometheus → Grafana (dashboards).
# Production services only — the experimental image_to_product project is excluded.
# Grafana admin + mysqld_exporter passwords come from the vault.
- name: Install monitoring stack (exporters + Prometheus + Grafana)
  hosts: local
  become: yes
  vars_files:
    - "{{ inventory_dir }}/../group_vars/all.yml"
    - "{{ inventory_dir }}/../group_vars/production.yml"
    - "{{ inventory_dir }}/../group_vars/secrets.yml"
  roles:
    - node_exporter
    - redis_exporter
    - mysqld_exporter
    - nginx_exporter
    - process_exporter
    - blackbox_exporter
    - prometheus
    - grafana
    - alerting
