---
# Copy the centralized env files (env/<project>/.env) into /opt/secrets.
# No vault needed here — the env files are plain local files (git-ignored).
- name: Provision centralized secrets
  hosts: local
  become: yes
  vars_files:
    - "{{ inventory_dir }}/../group_vars/all.yml"
    - "{{ inventory_dir }}/../group_vars/production.yml"
  roles:
    - secrets
