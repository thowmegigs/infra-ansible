---
# Render per-project env files into /opt/secrets from the vault + templates.
# Requires the vault password (--ask-vault-pass) once secrets.yml is encrypted.
- name: Provision centralized secrets
  hosts: local
  become: yes
  vars_files:
    - "{{ inventory_dir }}/../group_vars/all.yml"
    - "{{ inventory_dir }}/../group_vars/production.yml"
    - "{{ inventory_dir }}/../group_vars/secrets.yml"
    - "{{ inventory_dir }}/../vars/env.yml"
  roles:
    - secrets
