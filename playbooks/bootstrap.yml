---
# First-time provisioning: base system packages + Node.js + PHP toolchains.
- name: Bootstrap VPS (base system, Node.js, PHP)
  hosts: local
  become: yes
  vars_files:
    - "{{ inventory_dir }}/../group_vars/all.yml"
    - "{{ inventory_dir }}/../group_vars/production.yml"
  roles:
    - common
    - node
    - php
