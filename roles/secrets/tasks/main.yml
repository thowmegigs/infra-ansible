---
# Render each project's .env into /opt/secrets/<project>.env from vars/env.yml
# (non-secret) + group_vars/secrets.yml (vault). No plaintext secret ever lives
# in an app repo or project folder — only root-readable files in /opt/secrets.
- name: "PHASE :: SECRETS — render env files into {{ secrets_dir }}"
  debug:
    msg: "========== SECRETS :: {{ project_env | length }} env file(s) -> {{ secrets_dir }} (root:root, dir 0700 / files 0600) =========="

- name: Ensure secrets directory exists (root:root 0700)
  file:
    path: "{{ secrets_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Render per-project env files from vault + template
  template:
    src: "{{ inventory_dir }}/../templates/env.j2"
    dest: "{{ item.value.dest }}"
    owner: root
    group: root
    mode: "0600"
  loop: "{{ project_env | dict2items }}"
  loop_control:
    label: "{{ item.value.dest }}"
  register: env_render
  no_log: true

- name: Record whether any env file changed (for downstream reload/restart)
  set_fact:
    secrets_changed: "{{ (env_render.results | default([]) | selectattr('changed', 'defined') | selectattr('changed') | list | length) > 0 }}"

- name: Secrets summary
  debug:
    msg: "Rendered {{ project_env | length }} env file(s) to {{ secrets_dir }}; changed this run: {{ secrets_changed }}"
