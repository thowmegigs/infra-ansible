---
# Copy the centralized env files from env/<project>/.env (git-ignored) into
# /opt/secrets/*.env with strict root-only permissions. No secret is ever stored
# in an application repo, ecosystem.config.js, or a playbook.
- name: "PHASE :: SECRETS — copy env files into {{ secrets_dir }}"
  debug:
    msg: "========== SECRETS :: {{ secret_env_files | length }} env file(s) -> {{ secrets_dir }} (root:root, dir 0700 / files 0600) =========="

- name: Ensure secrets directory exists (root:root 0700)
  file:
    path: "{{ secrets_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Check the env/ source directory exists on this host
  stat:
    path: "{{ inventory_dir }}/../env"
  register: env_dir

- name: Fail clearly if env/ is missing (it is git-ignored — copy it to the VPS)
  fail:
    msg: |
      The 'env/' directory was not found at {{ inventory_dir }}/../env

      env/ holds your real .env files and is GIT-IGNORED, so a plain `git clone`
      on the VPS does NOT include it. Copy it from your machine, then re-run:

        scp -r ./env  root@<SERVER_IP>:{{ inventory_dir | dirname }}/env

      Expected files: {{ secret_env_files | map(attribute='src') | join(', ') }}
  when: not env_dir.stat.exists

- name: Stat source env files
  stat:
    path: "{{ inventory_dir }}/../{{ item.src }}"
  loop: "{{ secret_env_files }}"
  loop_control:
    label: "{{ item.src }}"
  register: env_stats

- name: Warn about missing source env files
  debug:
    msg: "WARNING: source '{{ item.item.src }}' not found — {{ item.item.dest }} NOT created"
  loop: "{{ env_stats.results }}"
  loop_control:
    label: "{{ item.item.src }}"
  when: not item.stat.exists

- name: Fail if a required PRODUCTION env file is missing
  fail:
    msg: >-
      Required env file '{{ item.item.src }}' is missing on this host. Copy the
      env/ folder to the VPS (scp -r ./env root@<SERVER_IP>:{{ inventory_dir | dirname }}/env)
      and re-run. (Experimental image-to-product env files are optional.)
  loop: "{{ env_stats.results }}"
  loop_control:
    label: "{{ item.item.src }}"
  when:
    - not item.stat.exists
    - "'image-to-product' not in item.item.src"

- name: Copy present env files into {{ secrets_dir }} (root:root 0600)
  copy:
    src: "{{ inventory_dir }}/../{{ item.item.src }}"
    dest: "{{ item.item.dest }}"
    owner: root
    group: root
    mode: "0600"
  loop: "{{ env_stats.results }}"
  loop_control:
    label: "{{ item.item.dest }}"
  when: item.stat.exists
  register: env_copy
  no_log: true

- name: Record whether any env file changed (for downstream reload/restart)
  set_fact:
    secrets_changed: "{{ (env_copy.results | default([]) | selectattr('changed', 'defined') | selectattr('changed') | list | length) > 0 }}"

- name: Secrets summary
  debug:
    msg: "Secrets synced to {{ secrets_dir }}; changed this run: {{ secrets_changed }}"
