---
# redis_exporter — Redis metrics for Prometheus (localhost only).
- name: "PHASE :: REDIS_EXPORTER — install Redis metrics exporter"
  debug:
    msg: "========== REDIS_EXPORTER :: v{{ redis_exporter_version }} on 127.0.0.1:{{ redis_exporter_port }} =========="

- name: Create redis_exporter system user
  user:
    name: "{{ redis_exporter_user }}"
    system: yes
    shell: /usr/sbin/nologin
    create_home: no

- name: Download redis_exporter
  get_url:
    url: "https://github.com/oliver006/redis_exporter/releases/download/v{{ redis_exporter_version }}/redis_exporter-v{{ redis_exporter_version }}.linux-{{ redis_exporter_arch }}.tar.gz"
    dest: "/tmp/redis_exporter-{{ redis_exporter_version }}.tar.gz"
    mode: "0644"

- name: Extract redis_exporter
  unarchive:
    src: "/tmp/redis_exporter-{{ redis_exporter_version }}.tar.gz"
    dest: /tmp
    remote_src: yes

- name: Install redis_exporter binary
  copy:
    src: "/tmp/redis_exporter-v{{ redis_exporter_version }}.linux-{{ redis_exporter_arch }}/redis_exporter"
    dest: "{{ redis_exporter_bin }}"
    owner: root
    group: root
    mode: "0755"
    remote_src: yes
  notify: restart redis_exporter

- name: Install redis_exporter systemd unit
  template:
    src: redis_exporter.service.j2
    dest: /etc/systemd/system/redis_exporter.service
    mode: "0644"
  notify: restart redis_exporter

- name: Ensure redis_exporter enabled and started
  systemd:
    name: redis_exporter
    enabled: yes
    state: started
    daemon_reload: yes
