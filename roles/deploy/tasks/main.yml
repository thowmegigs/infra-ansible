---
# Clone/pull every repository and build it according to its type.
- name: "PHASE :: DEPLOY — clone/pull repositories and build apps"
  debug:
    msg: "========== DEPLOY :: {{ projects | length }} production project(s), {{ experimental_projects | length }} experimental project(s) =========="

- name: Ensure web root exists
  file:
    path: "{{ www_root }}"
    state: directory
    owner: "{{ web_owner }}"
    group: "{{ web_group }}"
    mode: "{{ web_dir_mode }}"

- name: Ensure shared uploads directory exists
  file:
    path: "{{ shared_uploads_dir }}"
    state: directory
    owner: "{{ shared_uploads_owner }}"
    group: "{{ shared_uploads_group }}"
    mode: "{{ shared_uploads_mode }}"

- name: Deploy production projects
  include_tasks: project.yml
  loop: "{{ projects | dict2items }}"
  loop_control:
    loop_var: project_item
    label: "{{ project_item.key }}"

- name: Deploy experimental monorepo projects
  include_tasks: experimental.yml
  loop: "{{ experimental_projects | dict2items }}"
  loop_control:
    loop_var: exp_item
    label: "{{ exp_item.key }}"

# ---------------------------------------------------------------------------
# Point each app's uploads dir at the central shared folder. Handles the case
# where the app already has a real (non-empty) uploads directory: migrate the
# files into the shared folder first, back up the original, then symlink.
# Idempotent + never deletes user-uploaded files.  (See uploads.yml.)
# ---------------------------------------------------------------------------
- name: Migrate & link shared uploads for each app
  include_tasks: uploads.yml
  loop: "{{ shared_uploads_links | default([]) }}"
  loop_control:
    loop_var: uploads_dest
    label: "{{ uploads_dest }}"
