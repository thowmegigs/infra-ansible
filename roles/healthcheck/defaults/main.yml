---
# Post-deploy verification. Runs last (after pm2/nginx/ssl).
healthcheck_port_timeout: 10        # seconds to wait for each port to listen
healthcheck_http_timeout: 10        # seconds per /health request
healthcheck_fail_on_down: true      # abort the run (with a clear list) if any app is down

# Apps to verify. Backends expose /health; Next.js frontends are checked on "/".
# Each: name, port, url (optional), expected_status (default 200).
healthcheck_apps:
  - { name: front,          port: "{{ projects.front.port }}",          url: "http://127.0.0.1:{{ projects.front.port }}/" }
  - { name: api,            port: "{{ projects.api.port }}",            url: "http://127.0.0.1:{{ projects.api.port }}/health" }
  - { name: seller_front,   port: "{{ projects.seller_front.port }}",   url: "http://127.0.0.1:{{ projects.seller_front.port }}/" }
  - { name: seller_backend, port: "{{ projects.seller_backend.port }}", url: "http://127.0.0.1:{{ projects.seller_backend.port }}/health" }

# Public ports that SHOULD be open in the firewall. App ports (5000/4001/…) are
# localhost-only behind nginx and must NOT be public; only these need to be open.
healthcheck_public_ports: [22, 80, 443]

# Infra systemd services that must be ACTIVE (running).
healthcheck_services:
  - nginx
  - mysql
  - redis-server
  - "php{{ php_version }}-fpm"
  - opensearch
  - loki
  - promtail
  - prometheus
  - grafana-server
  - node_exporter
  - redis_exporter
  - mysqld_exporter
  - nginx_exporter
  - process_exporter
  - blackbox_exporter
  - pm2-root

# Infra HTTP health endpoints (localhost). Ports come from group_vars/all.yml.
healthcheck_endpoints:
  - { name: opensearch,        url: "http://{{ opensearch_http_host }}:{{ opensearch_http_port }}" }
  - { name: loki,              url: "http://{{ loki_http_address }}:{{ loki_http_port }}/ready" }
  - { name: grafana,           url: "http://{{ grafana_http_address }}:{{ grafana_http_port }}/api/health" }
  - { name: prometheus,        url: "http://{{ prometheus_listen_address }}/-/healthy" }
  - { name: node_exporter,     url: "http://{{ node_exporter_listen_address }}/metrics" }
  - { name: redis_exporter,    url: "http://127.0.0.1:{{ redis_exporter_port }}/metrics" }
  - { name: mysqld_exporter,   url: "http://127.0.0.1:{{ mysqld_exporter_port }}/metrics" }
  - { name: nginx_exporter,    url: "http://127.0.0.1:{{ nginxlog_exporter_port }}/metrics" }
  - { name: process_exporter,  url: "http://127.0.0.1:{{ process_exporter_port }}/metrics" }
  - { name: blackbox_exporter, url: "http://127.0.0.1:{{ blackbox_exporter_port }}/metrics" }
