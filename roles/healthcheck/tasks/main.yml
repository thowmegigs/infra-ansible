---
# Verify production apps AND infra/monitoring services: ports, /health, systemd
# service state, infra health endpoints, redis ping, and firewall. Aborts with a
# clear list of everything that is down.
- name: "PHASE :: HEALTHCHECK — apps + infra services + firewall"
  debug:
    msg: "========== HEALTHCHECK :: {{ healthcheck_apps | length }} app(s), {{ healthcheck_services | length }} service(s), {{ healthcheck_endpoints | length }} endpoint(s) =========="

# --- 1. App ports listening? -----------------------------------------------
- name: "[hc] App port listening checks (127.0.0.1:<port>)"
  wait_for:
    host: 127.0.0.1
    port: "{{ item.port }}"
    timeout: "{{ healthcheck_port_timeout }}"
    state: started
  loop: "{{ healthcheck_apps }}"
  loop_control:
    label: "{{ item.name }}:{{ item.port }}"
  register: hc_ports
  ignore_errors: true

# --- 2. App /health endpoints healthy? -------------------------------------
- name: "[hc] App HTTP health checks"
  uri:
    url: "{{ item.url }}"
    method: GET
    status_code: "{{ item.expected_status | default(200) }}"
    timeout: "{{ healthcheck_http_timeout }}"
    follow_redirects: all
    validate_certs: false
  loop: "{{ healthcheck_apps }}"
  loop_control:
    label: "{{ item.name }} {{ item.url | default('(no url)') }}"
  register: hc_http
  when: item.url is defined
  ignore_errors: true

# --- 3. Infra systemd services active? -------------------------------------
- name: "[hc] Infra service state (systemctl is-active)"
  command: "systemctl is-active {{ item }}"
  loop: "{{ healthcheck_services }}"
  loop_control:
    label: "{{ item }}"
  register: hc_svc
  changed_when: false
  failed_when: false

# --- 4. Infra health endpoints respond? ------------------------------------
- name: "[hc] Infra HTTP health checks"
  uri:
    url: "{{ item.url }}"
    method: GET
    status_code: "{{ item.expected_status | default(200) }}"
    timeout: "{{ healthcheck_http_timeout }}"
    validate_certs: false
  loop: "{{ healthcheck_endpoints }}"
  loop_control:
    label: "{{ item.name }} {{ item.url }}"
  register: hc_endpoints
  ignore_errors: true

# --- 5. Redis answers PING? -------------------------------------------------
- name: "[hc] Redis PING"
  command: redis-cli ping
  register: hc_redis
  changed_when: false
  failed_when: false

# --- 6. Firewall (ufw) state ------------------------------------------------
- name: "[hc] Read firewall (ufw) status"
  command: ufw status
  register: hc_ufw
  changed_when: false
  failed_when: false

# --- Compute everything that is down ---------------------------------------
- name: "[hc] Compute down lists"
  set_fact:
    hc_down_apps: "{{ (
        (hc_ports.results | selectattr('failed', 'defined') | selectattr('failed') | map(attribute='item.name') | list)
        + (hc_http.results  | selectattr('failed', 'defined') | selectattr('failed') | map(attribute='item.name') | list)
      ) | unique }}"
    hc_down_services: "{{ hc_svc.results | rejectattr('stdout', 'equalto', 'active') | map(attribute='item') | list }}"
    hc_down_endpoints: "{{ hc_endpoints.results | selectattr('failed', 'defined') | selectattr('failed') | map(attribute='item.name') | list }}"
    hc_redis_ok: "{{ (hc_redis.stdout | default('') | trim) == 'PONG' }}"

- name: "[hc] Combine all failures"
  set_fact:
    hc_all_down: "{{ (hc_down_apps + hc_down_services + hc_down_endpoints + ([] if hc_redis_ok else ['redis:ping'])) | unique }}"

# --- Report -----------------------------------------------------------------
- name: "[hc] Report — applications"
  debug:
    msg: |-
      ================== APPLICATIONS ==================
      {% for r in hc_ports.results %}
      {{ "%-16s" | format(r.item.name) }} :{{ r.item.port }}  {{ 'UP  — listening' if not (r.failed | default(false)) else 'DOWN — nothing listening' }}
      {% endfor %}
      ------------------ /health endpoints --------------
      {% for r in hc_http.results %}
      {% if not (r.skipped | default(false)) %}
      {{ "%-16s" | format(r.item.name) }} {{ r.item.url }} -> {{ r.status | default('NO RESPONSE') }} {{ '(OK)' if (r.status | default(0)) == (r.item.expected_status | default(200)) else '(FAIL)' }}
      {% endif %}
      {% endfor %}

- name: "[hc] Report — infrastructure"
  debug:
    msg: |-
      ============ INFRA / MONITORING SERVICES ==========
      {% for r in hc_svc.results %}
      {{ "%-18s" | format(r.item) }} {{ 'ACTIVE' if (r.stdout == 'active') else 'NOT RUNNING (' + (r.stdout | default('unknown')) + ')' }}
      {% endfor %}
      redis-cli ping     {{ 'PONG (OK)' if hc_redis_ok else 'NO PONG (FAIL)' }}
      ------------------ health endpoints ---------------
      {% for r in hc_endpoints.results %}
      {{ "%-18s" | format(r.item.name) }} {{ r.item.url }} -> {{ r.status | default('NO RESPONSE') }} {{ '(OK)' if (r.status | default(0)) == (r.item.expected_status | default(200)) else '(FAIL)' }}
      {% endfor %}
      --------------------- firewall (ufw) --------------
      ufw: {{ 'ACTIVE' if ('Status: active' in hc_ufw.stdout) else 'inactive — no port filtering' }}
      {% if 'Status: active' in hc_ufw.stdout %}
      {% for p in healthcheck_public_ports %}
      public port {{ p }}: {{ 'ALLOWED' if ((p | string) in hc_ufw.stdout) else 'NOT ALLOWED — public access may be blocked!' }}
      {% endfor %}
      {% endif %}
      NOTE: app ports (5000/4001/…) are localhost-only behind nginx and need no
      firewall rule — only 22/80/443 must be open publicly.
      ===================================================

# --- Abort if anything is down ---------------------------------------------
- name: "[hc] FAIL — components are down"
  fail:
    msg: >-
      HEALTH CHECK FAILED. Down/unhealthy: {{ hc_all_down | join(', ') }}.
      Apps: `pm2 logs <app>`. Services: `systemctl status <svc>` / `journalctl -u <svc>`.
      Re-run after fixing (set healthcheck_fail_on_down: false to report-only).
  when:
    - healthcheck_fail_on_down | default(true)
    - (hc_all_down | length) > 0
