---
promtail_version: "2.9.8"
promtail_arch: amd64
promtail_bin: /usr/local/bin/promtail
promtail_config_dir: /etc/promtail
promtail_positions_dir: /var/lib/promtail
promtail_http_port: 9080
# Promtail runs as root so it can read logs owned by www-data / root / deploy_user.
promtail_user: root
loki_push_url: "http://{{ loki_http_address | default('127.0.0.1') }}:{{ loki_http_port | default(3310) }}/loki/api/v1/push"
