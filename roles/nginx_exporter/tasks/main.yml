---
# prometheus-nginxlog-exporter — derives request/status/response-time metrics
# from the nginx access logs (localhost only).
- name: "PHASE :: NGINX_EXPORTER — install nginx log metrics exporter"
  debug:
    msg: "========== NGINX_EXPORTER :: v{{ nginxlog_exporter_version }} on 127.0.0.1:{{ nginxlog_exporter_port }} =========="

- name: Ensure nginx_exporter config dir exists
  file:
    path: "{{ nginxlog_exporter_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Download prometheus-nginxlog-exporter
  get_url:
    url: "https://github.com/martin-helmich/prometheus-nginxlog-exporter/releases/download/v{{ nginxlog_exporter_version }}/prometheus-nginxlog-exporter_{{ nginxlog_exporter_version }}_linux_{{ nginxlog_exporter_arch }}.tar.gz"
    dest: "/tmp/nginxlog-exporter-{{ nginxlog_exporter_version }}.tar.gz"
    mode: "0644"

- name: Extract nginxlog exporter
  unarchive:
    src: "/tmp/nginxlog-exporter-{{ nginxlog_exporter_version }}.tar.gz"
    dest: /tmp
    remote_src: yes

- name: Install nginxlog exporter binary
  copy:
    src: /tmp/prometheus-nginxlog-exporter
    dest: "{{ nginxlog_exporter_bin }}"
    owner: root
    group: root
    mode: "0755"
    remote_src: yes
  notify: restart nginx_exporter

- name: Configure nginxlog exporter
  template:
    src: nginx-exporter.yml.j2
    dest: "{{ nginxlog_exporter_config_dir }}/config.yml"
    owner: root
    group: root
    mode: "0644"
  notify: restart nginx_exporter

- name: Install nginxlog exporter systemd unit
  template:
    src: nginx_exporter.service.j2
    dest: /etc/systemd/system/nginx_exporter.service
    mode: "0644"
  notify: restart nginx_exporter

- name: Ensure nginxlog exporter enabled and started
  systemd:
    name: nginx_exporter
    enabled: yes
    state: started
    daemon_reload: yes
