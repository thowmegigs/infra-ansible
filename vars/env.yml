---
# ===========================================================================
# NON-SECRET env definitions (safe to commit). Secret values are pulled from
# group_vars/secrets.yml (vault) via {{ vault_* }} references. The `secrets`
# role renders each entry below into <dest> using templates/env.j2.
#
# All values are strings so rendering is predictable. The template quotes a
# value only when it contains special characters (so Laravel still casts
# false/null/numbers correctly and bash-sourced Node env files stay safe).
# ===========================================================================
project_env:

  # --- front (Next.js, public storefront) ----------------------------------
  front:
    dest: "{{ secrets_dir }}/front.env"
    vars:
      NODE_ENV: "production"
      PORT: "{{ projects.front.port }}"
      NEXT_PUBLIC_IMAGE_URL: "https://admin.{{ domain }}"
      NEXT_PUBLIC_LARAVEL_ADMIN_URL: "https://admin.{{ domain }}"
      NEXT_PUBLIC_RAZORPAY_KEY_ID: "rzp_live_RwIgpkWaUBxEbU"   # publishable (public) key
      NEXT_PUBLIC_RETURN_DAYS: "3"

  # --- api (Express) -------------------------------------------------------
  api:
    dest: "{{ secrets_dir }}/api.env"
    vars:
      PORT: "{{ projects.api.port }}"
      NODE_ENV: "production"
      LARAVEL_ADMIN_URL: "https://admin.{{ domain }}"
      DSN: "{{ vault_api_sentry_dsn }}"
      JWT_SECRET: "{{ vault_api_jwt_secret }}"
      JWT_EXPIRY: "1d"
      JWT_REFRESH_SECRET: "{{ vault_api_jwt_refresh_secret }}"
      JWT_REFRESH_EXPIRY: "30d"
      MYSQL_HOST: "127.0.0.1"
      MYSQL_USER: "admin"
      MYSQL_PASSWORD: "{{ vault_db_password }}"
      MYSQL_DATABASE: "{{ mysql_import_db }}"
      EMAIL_HOST: "smtp.zoho.in"
      EMAIL_PORT: "587"
      EMAIL_SECURE: "false"
      EMAIL_USER: "support@{{ domain }}"
      EMAIL_PASS: "{{ vault_zoho_smtp_password }}"
      EMAIL_FROM: "support@{{ domain }}"
      RAZORPAY_KEY_ID: "{{ vault_api_razorpay_key_id }}"
      RAZORPAY_KEY_SECRET: "{{ vault_api_razorpay_key_secret }}"
      SHIPROCKET_EMAIL: "novaitadev90@gmail.com"
      SHIPROCKET_PASSWORD: "{{ vault_api_shiprocket_password }}"
      ELASTICSEARCH_NODE: "http://localhost:9200"
      ELASTICSEARCH_USERNAME: "elastic"
      ELASTICSEARCH_PASSWORD: "{{ vault_api_elasticsearch_password }}"
      REDIS_URL: "redis://127.0.0.1:6379"
      REDIS_HOST: "127.0.0.1"
      REDIS_PORT: "6379"
      REDIS_TTL: "3600"
      COMMISION_RATE: "0.5"

  # --- admin (Laravel) -----------------------------------------------------
  admin:
    dest: "{{ secrets_dir }}/admin.env"
    vars:
      APP_NAME: "Colourdingo Marketplace"
      APP_ENV: "production"
      APP_KEY: "{{ vault_admin_app_key }}"
      APP_DEBUG: "false"
      APP_URL: "https://admin.{{ domain }}"
      APP_LOCALE: "en"
      APP_FALLBACK_LOCALE: "en"
      APP_FAKER_LOCALE: "en_US"
      APP_MAINTENANCE_DRIVER: "file"
      PHP_CLI_SERVER_WORKERS: "4"
      BCRYPT_ROUNDS: "12"
      LOG_CHANNEL: "stack"
      LOG_STACK: "single"
      LOG_DEPRECATIONS_CHANNEL: "null"
      LOG_LEVEL: "error"
      DB_CONNECTION: "mysql"
      DB_HOST: "127.0.0.1"
      DB_PORT: "3306"
      DB_DATABASE: "{{ mysql_import_db }}"
      DB_USERNAME: "admin"
      DB_PASSWORD: "{{ vault_db_password }}"
      SESSION_DRIVER: "file"
      SESSION_LIFETIME: "120"
      SESSION_ENCRYPT: "false"
      SESSION_PATH: "/"
      SESSION_DOMAIN: "null"
      BROADCAST_CONNECTION: "log"
      FILESYSTEM_DISK: "local"
      QUEUE_CONNECTION: "redis"
      CACHE_STORE: "file"
      MEMCACHED_HOST: "127.0.0.1"
      COMMISSION_RATE: "0.1"
      REDIS_CLIENT: "predis"
      REDIS_HOST: "127.0.0.1"
      REDIS_PASSWORD: "null"
      REDIS_PORT: "6379"
      HORIZON_DOMAIN: "admin.{{ domain }}"
      MAIL_MAILER: "smtp"
      MAIL_HOST: "smtp.zoho.in"
      MAIL_PORT: "587"
      MAIL_USERNAME: "support@{{ domain }}"
      MAIL_PASSWORD: "{{ vault_zoho_smtp_password }}"
      MAIL_ENCRYPTION: "tls"
      MAIL_FROM_ADDRESS: "support@{{ domain }}"
      MAIL_FROM_NAME: "Colour Indigo"
      AWS_DEFAULT_REGION: "us-east-1"
      AWS_USE_PATH_STYLE_ENDPOINT: "false"
      JWT_SECRET: "{{ vault_admin_jwt_secret }}"
      razor_key: "{{ vault_admin_razor_key }}"
      razor_secret: "{{ vault_admin_razor_secret }}"
      SCOUT_DRIVER: "algolia"
      ELASTICSEARCH_HOST: "localhost"
      ELASTICSEARCH_PORT: "9200"
      ALGOLIA_APP_ID: "T55UYZ1VAO"
      ALGOLIA_SECRET: "{{ vault_admin_algolia_secret }}"
      SCOUT_QUEUE: "false"
      TWILIO_SID: "{{ vault_admin_twilio_sid }}"
      TWILIO_TOKEN: "{{ vault_admin_twilio_token }}"
      TWILIO_PHONE_NUMBER: "+19283616168"
      SHIPROCKET_EMAIL: "novaitadev90@gmail.com"
      SHIPROCKET_PASSWORD: "{{ vault_admin_shiprocket_password }}"
      SENTRY_LARAVEL_DSN: "{{ vault_admin_sentry_dsn }}"
      SENTRY_TRACES_SAMPLE_RATE: "1.0"
      FIREBASE_SERVER_KEY: "{{ vault_admin_firebase_server_key }}"
      FIREBASE_SENDER_ID: "YOUR_FIREBASE_SENDER_ID"
      FIREBASE_PROJECT_ID: "colour-indigo-48669"
      FIREBASE_CREDENTIALS_PATH: "storage/app/firebase/firebase-service-account.json"
      DELHIVERY_TOKEN: "{{ vault_admin_delhivery_token }}"
      DELHIVERY_URL: "https://track.delhivery.com"
      OCTANE_SERVER: "swoole"

  # --- seller-front (Next.js) ----------------------------------------------
  seller-front:
    dest: "{{ secrets_dir }}/seller-front.env"
    vars:
      NODE_ENV: "production"
      PORT: "{{ projects.seller_front.port }}"
      NEXT_PUBLIC_BACKEND_URL: "https://seller-api.{{ domain }}/api"
      NEXT_PUBLIC_API_URL: "https://seller-api.{{ domain }}"
      BACKEND_URL: "http://localhost:{{ projects.seller_backend.port }}"
      JWT_SECRET: "{{ vault_seller_front_jwt_secret }}"

  # --- seller-backend (Express) --------------------------------------------
  seller-backend:
    dest: "{{ secrets_dir }}/seller-backend.env"
    vars:
      NODE_ENV: "production"
      PORT: "{{ projects.seller_backend.port }}"
      DB_HOST: "localhost"
      DB_USER: "admin"
      DB_PASSWORD: "{{ vault_db_password }}"
      DB_NAME: "{{ mysql_import_db }}"
      DB_PORT: "3306"
      JWT_SECRET: "{{ vault_seller_jwt_secret }}"
      JWT_EXPIRES_IN: "7d"
      EMAIL_HOST: "smtp.zoho.in"
      EMAIL_PORT: "587"
      EMAIL_USER: "support@{{ domain }}"
      EMAIL_PASS: "{{ vault_zoho_smtp_password }}"
      OTP_EXPIRES_IN: "5m"
      GEMINI_API_KEY: "{{ vault_seller_gemini_api_key }}"
      # Redis Cloud (BullMQ image queue) — external, separate from local redis
      REDIS_HOST: "redis-10981.c16.us-east-1-3.ec2.cloud.redislabs.com"
      REDIS_PORT: "10981"
      REDIS_USERNAME: "default"
      REDIS_PASSWORD: "{{ vault_seller_redis_password }}"
      REDIS_TLS: "false"
      REDIS_DB: "0"
      IMAGE_WORKER_CONCURRENCY: "3"
